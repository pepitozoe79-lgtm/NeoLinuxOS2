<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLinux OS - Premium Desktop Environment</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Boot Screen -->
    <div id="boot-screen" style="position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease;">
        <div style="font-size: 80px; margin-bottom: 20px;">🐧</div>
        <div style="width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div id="boot-progress" style="width: 0%; height: 100%; background: var(--accent-primary); transition: width 0.1s ease;"></div>
        </div>
        <div id="boot-status" style="margin-top: 15px; font-family: monospace; font-size: 12px; color: #888;">Initializing WebLinux Kernel...</div>
    </div>

    <!-- OS Interface -->
    <div id="desktop">
        <div id="desktop-icons"></div>
    </div>

    <div id="panel">
        <button id="start-btn" title="Applications">🐧</button>
        <div id="taskbar-apps"></div>
        <div id="system-tray">
            <span id="clock-display"></span>
        </div>
    </div>

    <div id="start-menu" class="glass">
        <div class="search-box">
            <input type="text" id="start-search" placeholder="Search applications..." autocomplete="off">
        </div>
        <div class="app-list" id="start-app-list"></div>
    </div>

    <!-- Shared Context Menu -->
    <div class="context-menu glass" id="desktop-context-menu">
        <div class="ctx-item" data-action="refresh">🔄 Refresh Desktop</div>
        <div class="ctx-item" data-action="terminal">💻 Open Terminal</div>
        <div class="ctx-item" data-action="files">📁 Open File Manager</div>
    </div>

    <!-- Core Scripts -->
    <script src="js/apps.js"></script>
    <script src="js/wm.js"></script>
    <script src="js/os.js"></script>

    <!-- Boot Sequence Control -->
    <script>
        (function() {
            const bootScreen = document.getElementById('boot-screen');
            const bootProgress = document.getElementById('boot-progress');
            const bootStatus = document.getElementById('boot-status');
            const statuses = [
                "Loading modules...",
                "Starting window manager...",
                "Mounting virtual file system...",
                "Initializing desktop environment...",
                "System ready."
            ];

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        bootScreen.style.opacity = '0';
                        setTimeout(() => bootScreen.style.display = 'none', 800);
                    }, 500);
                }
                bootProgress.style.width = progress + '%';
                bootStatus.textContent = statuses[Math.floor((progress/100) * (statuses.length - 1))];
            }, 50);
        })();
    </script>
</body>
</html>
